dua3.utility.fx.launcher.arg.log_level.name=Úroveň protokolovania
dua3.utility.fx.launcher.arg.log_level.description=Nastavte globálnu úroveň protokolovania alebo úroveň protokolovania pre vybrané loggery.\n\
Použite viackrát na nastavenie rôznych úrovní pre rôzne loggery.\n\
Formát na nastavenie úrovne protokolovania pre balík je <prefix>=<level>,\n\
na nastavenie globálnej úrovne protokolovania použite <level>.\n\
Predpony sa považujú za názvy balíkov, t. j. predpona „com.example“\n\
zodpovedá loggerom s názvom „com.example“, „com.example.foo“ atď., ale\n\
NIE „com.example_foo“.
