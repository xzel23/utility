dua3.utility.fx.launcher.arg.log_level.name=Уровень логирования
dua3.utility.fx.launcher.arg.log_level.description=Установите глобальный уровень логирования или уровень логирования для выбранных логгеров.\n\
Используйте несколько раз, чтобы установить разные уровни для разных логгеров.\n\
Формат установки уровня логирования для пакета: <prefix>=<level>,\n\
для установки глобального уровня логирования используйте <level>.\n\
Префиксы рассматриваются как имена пакетов, т. е. префикс «com.example»\n\
соответствует логгерам с именами «com.example», «com.example.foo» и т. д., но\n\
НЕ «com.example_foo».
