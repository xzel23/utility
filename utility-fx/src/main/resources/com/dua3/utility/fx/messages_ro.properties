dua3.utility.fx.launcher.arg.log_level.name=Nivel de jurnalizare
dua3.utility.fx.launcher.arg.log_level.description=Setați nivelul de jurnalizare global sau nivelul de jurnalizare pentru jurnalele selectate.\n\
Utilizați de mai multe ori pentru a seta niveluri diferite pentru jurnale diferite.\n\
Formatul pentru setarea nivelului de jurnalizare pentru un pachet este <prefix>=<level>,\n\
pentru a seta nivelul de jurnalizare global utilizați <level>.\n\
Prefixele sunt tratate ca nume de pachete, adică prefixul „com.example”\n\
se potrivește cu jurnalele cu numele „com.example”, „com.example.foo” etc., dar\n\
NU cu „com.example_foo”.
