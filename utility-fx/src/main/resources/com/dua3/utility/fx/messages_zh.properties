dua3.utility.fx.controls.launcher.arg.log_level.name=日志级别
dua3.utility.fx.controls.launcher.arg.log_level.description=设置全局日志级别或所选记录器的日志级别。\n\
多次使用可为不同的记录器设置不同的级别。\n\
为包设置日志级别的格式为 <prefix>=<level>，\n\
要设置全局日志级别，请使用 <level>。\n\
前缀被视为包名称，即前缀 "com.example"\n\
匹配名为 "com.example"、"com.example.foo" 等的记录器，但\n\
不匹配 "com.example_foo"。
dua3.utility.fx.controls.launcher.arg.log_buffer_size.name=日志缓冲区大小
dua3.utility.fx.controls.launcher.arg.log_buffer_size.description=设置日志缓冲区的大小。
