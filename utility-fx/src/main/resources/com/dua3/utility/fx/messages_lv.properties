dua3.utility.fx.launcher.arg.log_level.name=Žurnāla līmenis
dua3.utility.fx.launcher.arg.log_level.description=Iestatiet globālo žurnāla līmeni vai žurnāla līmeni atlasītajiem žurnālistiem.\n\
Izmantojiet vairākas reizes, lai iestatītu dažādus līmeņus dažādiem žurnālistiem.\n\
Pakotnes žurnāla līmeņa iestatīšanas formāts ir <prefix>=<level>,\n\
lai iestatītu globālo žurnāla līmeni, izmantojiet <level>.\n\
Prefiksi tiek uzskatīti par pakotņu nosaukumiem, t.i., prefikss "com.example"\n\
atbilst žurnālistiem ar nosaukumu "com.example", "com.example.foo" utt., bet\n\
NEVIS "com.example_foo".
