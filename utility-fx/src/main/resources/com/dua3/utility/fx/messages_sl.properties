dua3.utility.fx.launcher.arg.log_level.name=Raven beleženja
dua3.utility.fx.launcher.arg.log_level.description=Nastavite globalno raven beleženja ali raven beleženja za izbrane zapisovalnike.\n\
Uporabite večkrat, da nastavite različne ravni za različne zapisovalnike.\n\
Format za nastavitev ravni beleženja za paket je <prefix>=<level>,\n\
za nastavitev globalne ravni beleženja uporabite <level>.\n\
Predpone se obravnavajo kot imena paketov, tj. predpona "com.example"\n\
ustreza zapisovalnikom z imenom "com.example", "com.example.foo" itd., vendar\n\
NE "com.example_foo".
