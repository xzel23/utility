dua3.utility.fx.controls.launcher.arg.log_level.name=Niveau de journalisation
dua3.utility.fx.controls.launcher.arg.log_level.description=Définit le niveau de journalisation global ou le niveau de journalisation pour les journaux sélectionnés.\n\
Utilisez plusieurs fois pour définir différents niveaux pour différents journaux.\n\
Le format pour définir le niveau de journalisation d'un paquet est <prefix>=<level>,\n\
pour définir le niveau de journalisation global, utilisez <level>.\n\
Les préfixes sont traités comme des noms de paquets, c'est-à-dire que le préfixe « com.example »\n\
correspond aux journaux nommés « com.example », « com.example.foo », etc., mais\n\
PAS à « com.example_foo ».
