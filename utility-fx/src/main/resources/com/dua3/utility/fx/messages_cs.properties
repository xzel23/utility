dua3.utility.fx.controls.launcher.arg.log_level.name=Úroveň protokolování
dua3.utility.fx.controls.launcher.arg.log_level.description=Nastavte globální úroveň protokolování nebo úroveň protokolování pro vybrané loggery.\n\
Použijte vícekrát pro nastavení různých úrovní pro různé loggery.\n\
Formát pro nastavení úrovně protokolování pro balíček je <prefix>=<level>,\n\
pro nastavení globální úrovně protokolování použijte <level>.\n\
Předpony jsou považovány za názvy balíčků, tj. předpona „com.example“\n\
odpovídá loggerům s názvem „com.example“, „com.example.foo“ atd., ale\n\
NIKOLI „com.example_foo“.
