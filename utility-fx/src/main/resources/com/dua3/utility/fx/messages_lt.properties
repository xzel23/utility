dua3.utility.fx.controls.launcher.arg.log_level.name=Žurnalo lygis
dua3.utility.fx.controls.launcher.arg.log_level.description=Nustatykite visuotinį žurnalo lygį arba pasirinktų registratorių žurnalo lygį.\n\
Naudokite kelis kartus, kad nustatytumėte skirtingus lygius skirtingiems registratoriams.\n\
Paketo žurnalo lygio nustatymo formatas yra <prefix>=<level>,\n\
visuotiniam žurnalo lygiui nustatyti naudokite <level>.\n\
Priešdėliai laikomi paketų pavadinimais, t. y. priešdėlis „com.example“\n\
atitinka registratorius, kurių pavadinimas yra „com.example“, „com.example.foo“ ir kt., bet\n\
NE „com.example_foo“.
