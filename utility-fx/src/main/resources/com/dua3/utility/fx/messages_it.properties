dua3.utility.fx.controls.launcher.arg.log_level.name=Livello di log
dua3.utility.fx.controls.launcher.arg.log_level.description=Imposta il livello di log globale o il livello di log per i logger selezionati.\n\
Usa più volte per impostare livelli diversi per logger diversi.\n\
Il formato per impostare il livello di log per un pacchetto è <prefix>=<level>,\n\
per impostare il livello di log globale usa <level>.\n\
I prefissi sono trattati come nomi di pacchetto, cioè il prefisso "com.example"\n\
corrisponde ai logger con il nome "com.example", "com.example.foo", ecc., ma\n\
NON "com.example_foo".
