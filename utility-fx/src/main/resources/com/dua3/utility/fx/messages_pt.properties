dua3.utility.fx.launcher.arg.log_level.name=Nível de log
dua3.utility.fx.launcher.arg.log_level.description=Defina o nível de log global ou o nível de log para registradores selecionados.\n\
Use várias vezes para definir níveis diferentes para registradores diferentes.\n\
O formato para definir o nível de log para um pacote é <prefix>=<level>,\n\
para definir o nível de log global use <level>.\n\
Os prefixos são tratados como nomes de pacotes, ou seja, o prefixo "com.example"\n\
corresponde a registradores com o nome "com.example", "com.example.foo", etc., mas\n\
NÃO "com.example_foo".
