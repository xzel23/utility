dua3.utility.fx.controls.launcher.arg.log_level.name=Log-Level
dua3.utility.fx.controls.launcher.arg.log_level.description=\
Legen Sie den globalen Log-Level oder den Log-Level für ausgewählte Logger fest.\n\
Verwenden Sie dies mehrfach, um verschiedene Level für verschiedene Logger festzulegen.\n\
Das Format zum Festlegen des Log-Levels für ein Paket ist <prefix>=<level>,\n\
zum Festlegen des globalen Log-Levels verwenden Sie <level>.\n\
Präfixe werden wie Paketnamen behandelt, d. h. das Präfix „com.example“\n\
passt auf Logger mit dem Namen „com.example“, „com.example.foo“ usw., aber\n\
NICHT „com.example_foo“.
