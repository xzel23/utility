dua3.utility.fx.controls.launcher.arg.log_level.name=Poziom logowania
dua3.utility.fx.controls.launcher.arg.log_level.description=Ustaw globalny poziom logowania lub poziom logowania dla wybranych loggerów.\n\
Użyj wielokrotnie, aby ustawić różne poziomy dla różnych loggerów.\n\
Format ustawiania poziomu logowania dla pakietu to <prefix>=<level>,\n\
aby ustawić globalny poziom logowania, użyj <level>.\n\
Prefiksy są traktowane jak nazwy pakietów, tj. prefiks „com.example”\n\
pasuje do loggerów o nazwie „com.example”, „com.example.foo” itd., ale\n\
NIE „com.example_foo”.
