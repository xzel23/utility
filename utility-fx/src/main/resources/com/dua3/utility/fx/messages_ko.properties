dua3.utility.fx.launcher.arg.log_level.name=로그 레벨
dua3.utility.fx.launcher.arg.log_level.description=전역 로그 레벨 또는 선택한 로거의 로그 레벨을 설정합니다.\n\
여러 로거에 다른 레벨을 설정하려면 여러 번 사용하십시오.\n\
패키지의 로그 레벨을 설정하는 형식은 <prefix>=<level> 이며,\n\
전역 로그 레벨을 설정하려면 <level> 을 사용하십시오.\n\
접두사는 패키지 이름처럼 취급됩니다. 즉, 접두사 "com.example" 은\n\
"com.example", "com.example.foo" 등의 이름을 가진 로거와 일치하지만\n\
"com.example_foo" 와는 일치하지 않습니다.
dua3.utility.fx.launcher.arg.log_buffer_size.name=로그 버퍼 크기
dua3.utility.fx.launcher.arg.log_buffer_size.description=로그 버퍼의 크기를 설정합니다.
