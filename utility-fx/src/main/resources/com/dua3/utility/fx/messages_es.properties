dua3.utility.fx.launcher.arg.log_level.name=Nivel de registro
dua3.utility.fx.launcher.arg.log_level.description=Establezca el nivel de registro global o el nivel de registro para los registradores seleccionados.\n\
Úselo varias veces para establecer diferentes niveles para diferentes registradores.\n\
El formato para establecer el nivel de registro para un paquete es <prefix>=<level>,\n\
para establecer el nivel de registro global use <level>.\n\
Los prefijos se tratan como nombres de paquetes, es decir, el prefijo "com.example"\n\
coincide con los registradores con el nombre "com.example", "com.example.foo", etc., pero\n\
NO "com.example_foo".
dua3.utility.fx.launcher.arg.log_buffer_size.name=Tamaño del búfer de registro
dua3.utility.fx.launcher.arg.log_buffer_size.description=Establecer el tamaño del búfer de registro.
