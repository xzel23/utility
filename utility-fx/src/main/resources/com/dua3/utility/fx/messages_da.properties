dua3.utility.fx.launcher.arg.log_level.name=Logniveau
dua3.utility.fx.launcher.arg.log_level.description=Indstil det globale logniveau eller logniveauet for valgte loggere.\n\
Brug flere gange for at indstille forskellige niveauer for forskellige loggere.\n\
Formatet til at indstille logniveauet for en pakke er <prefix>=<level>,\n\
for at indstille det globale logniveau skal du bruge <level>.\n\
Præfikser behandles som pakkenavne, dvs. præfikset "com.example"\n\
matcher loggere med navnet "com.example", "com.example.foo" osv., men\n\
IKKE "com.example_foo".
