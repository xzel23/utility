dua3.utility.fx.launcher.arg.log_level.name=日誌級別
dua3.utility.fx.launcher.arg.log_level.description=設置全域日誌級別或所選記錄器的日誌級別。\n\
多次使用可為不同的記錄器設置不同的級別。\n\
為包設置日誌級別的格式為 <prefix>=<level>，\n\
要設置全域日誌級別，請使用 <level>。\n\
前綴被視為包名稱，即前綴 "com.example"\n\
匹配名為 "com.example"、"com.example.foo" 等的記錄器，但\n\
不匹配 "com.example_foo"。
dua3.utility.fx.launcher.arg.log_buffer_size.name=日誌緩衝區大小
dua3.utility.fx.launcher.arg.log_buffer_size.description=設置日誌緩衝區的大小。
