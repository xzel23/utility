dua3.utility.fx.launcher.arg.log_level.description=Ορίστε το γενικό επίπεδο καταγραφής ή το επίπεδο καταγραφής για επιλεγμένους καταγραφείς.\n\
Χρησιμοποιήστε το πολλές φορές για να ορίσετε διαφορετικά επίπεδα για διαφορετικούς καταγραφείς.\n\
Η μορφή για τον ορισμό του επιπέδου καταγραφής για ένα πακέτο είναι <prefix>=<level>,\n\
για να ορίσετε το γενικό επίπεδο καταγραφής χρησιμοποιήστε <level>.\n\
Τα προθέματα αντιμετωπίζονται ως ονόματα πακέτων, δηλαδή το πρόθεμα "com.example"\n\
ταιριάζει με καταγραφείς με το όνομα "com.example", "com.example.foo" κ.λπ., αλλά\n\
ΟΧΙ με το "com.example_foo".
