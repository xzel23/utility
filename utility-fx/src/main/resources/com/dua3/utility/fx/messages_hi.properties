dua3.utility.fx.launcher.arg.log_level.description=वैश्विक लॉग स्तर या चयनित लॉगर्स के लिए लॉग स्तर सेट करें।\n\
विभिन्न लॉगर्स के लिए अलग-अलग स्तर सेट करने के लिए कई बार उपयोग करें।\n\
किसी पैकेज के लिए लॉग स्तर सेट करने का प्रारूप <prefix>=<level> है,\n\
वैश्विक लॉग स्तर सेट करने के लिए <level> का उपयोग करें।\n\
उपसर्गों को पैकेज नामों की तरह माना जाता है, यानी उपसर्ग "com.example"\n\
"com.example", "com.example.foo", आदि नाम वाले लॉगर्स से मेल खाता है, लेकिन\n\
"com.example_foo" से नहीं।
