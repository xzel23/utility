dua3.utility.fx.controls.launcher.arg.log_level.name=Logniveau
dua3.utility.fx.controls.launcher.arg.log_level.description=Stel het globale logniveau in of het logniveau voor geselecteerde loggers.\n\
Gebruik meerdere keren om verschillende niveaus in te stellen voor verschillende loggers.\n\
Het formaat om het logniveau voor een pakket in te stellen is <prefix>=<level>,\n\
om het globale logniveau in te stellen gebruikt u <level>.\n\
Prefixen worden behandeld als pakketnamen, d.w.z. het prefix "com.example"\n\
komt overeen met loggers met de naam "com.example", "com.example.foo", enz., maar\n\
NIET "com.example_foo".
