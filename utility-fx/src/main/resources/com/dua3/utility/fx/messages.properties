dua3.utility.fx.launcher.arg.log_level.name=Log Level
dua3.utility.fx.launcher.arg.log_level.description=\
Set the global Log Level or the Log Level for selected loggers.\n\
Use multiple times to set different levels for different loggers.\n\
The format to set the Log Level for a package is <prefix>=<level>,\n\
to set the global Log Level use <level>.\n\
Prefixes are treated like package names, i.e., the prefix "com.example"\n\
matches loggers with the name "com.example", "com.example.foo", etc., but\n\
NOT "com.example_foo".
dua3.utility.fx.launcher.arg.log_buffer_size.name=Log Buffer Size
dua3.utility.fx.launcher.arg.log_buffer_size.description=Set the Size of the Log Buffer.
