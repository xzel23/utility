dua3.utility.fx.controls.launcher.arg.log_level.description=Atur Level Log global atau Level Log untuk logger terpilih.\n\
Gunakan beberapa kali untuk mengatur level yang berbeda untuk logger yang berbeda.\n\
Format untuk mengatur Level Log untuk sebuah paket adalah <prefix>=<level>,\n\
untuk mengatur Level Log global gunakan <level>.\n\
Prefiks diperlakukan seperti nama paket, yaitu prefiks "com.example"\n\
cocok dengan logger dengan nama "com.example", "com.example.foo", dll., tetapi\n\
BUKAN "com.example_foo".
