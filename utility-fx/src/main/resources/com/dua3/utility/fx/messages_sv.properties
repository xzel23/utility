dua3.utility.fx.launcher.arg.log_level.name=Lognivå
dua3.utility.fx.launcher.arg.log_level.description=Ställ in den globala lognivån eller lognivån för valda loggare.\n\
Använd flera gånger för att ställa in olika nivåer för olika loggare.\n\
Formatet för att ställa in lognivån för ett paket är <prefix>=<level>,\n\
för att ställa in den globala lognivån använd <level>.\n\
Prefix behandlas som paketnamn, d.v.s. prefixet "com.example"\n\
matchar loggare med namnet "com.example", "com.example.foo" o.s.v., men\n\
INTE "com.example_foo".
