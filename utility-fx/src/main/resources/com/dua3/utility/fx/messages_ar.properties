لتعيين مستوى السجل العالمي استخدم <level>.\n\
تُعامل البوادئ كأسماء حزم، أي أن البادئة "com.example"\n\
تطابق المسجلات التي تحمل الاسم "com.example" و "com.example.foo" وما إلى ذلك، ولكن\n\
ليس "com.example_foo".
