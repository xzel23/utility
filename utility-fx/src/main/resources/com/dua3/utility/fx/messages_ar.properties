dua3.utility.fx.controls.launcher.arg.log_level.description=تعيين مستوى السجل العام أو لمسجلات محددة.\n\
استخدم هذا الخيار عدة مرات لتعيين مستويات مختلفة لمسجلات مختلفة.\n\
تنسيق تعيين مستوى السجل لحزمة هو <level>=<prefix>،\n\
لتعيين مستوى السجل العام استخدم <level>.\n\
تُعامل البوادئ كبداية لأسماء الحزم؛ أي أن البادئة "com.example"\n\
تطابق المسجلات التي تبدأ بـ "com.example" أو "com.example.foo" وما إلى ذلك،\n\
ولكن ليس "com.example_foo".
