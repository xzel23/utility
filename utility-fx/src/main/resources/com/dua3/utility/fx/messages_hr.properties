dua3.utility.fx.launcher.arg.log_level.name=Razina zapisivanja
dua3.utility.fx.launcher.arg.log_level.description=Postavite globalnu razinu zapisivanja ili razinu zapisivanja za odabrane zapisivače.\n\
Koristite više puta za postavljanje različitih razina za različite zapisivače.\n\
Format za postavljanje razine zapisivanja za paket je <prefix>=<level>,\n\
za postavljanje globalne razine zapisivanja koristite <level>.\n\
Prefiksi se tretiraju kao nazivi paketa, tj. prefiks "com.example"\n\
odgovara zapisivačima s nazivom "com.example", "com.example.foo" itd., ali\n\
NE i "com.example_foo".
