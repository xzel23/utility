dua3.utility.fx.launcher.arg.log_level.name=Naplózási szint
dua3.utility.fx.launcher.arg.log_level.description=Állítsa be a globális naplózási szintet vagy a kiválasztott naplózók naplózási szintjét.\n\
Használja többször a különböző szintek beállításához a különböző naplózókhoz.\n\
Egy csomag naplózási szintjének beállítási formátuma <prefix>=<level>,\n\
a globális naplózási szint beállításához használja a <level> értéket.\n\
A prefixumokat csomagnévként kezeli a rendszer, azaz a „com.example” prefixum\n\
illeszkedik a „com.example”, „com.example.foo” stb. nevű naplózókra, de\n\
NEM a „com.example_foo” névre.
