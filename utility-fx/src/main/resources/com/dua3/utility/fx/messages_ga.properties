dua3.utility.fx.launcher.arg.log_level.name=Leibhéal Logála
dua3.utility.fx.launcher.arg.log_level.description=Socraigh an Leibhéal Logála domhanda nó an Leibhéal Logála do logálaithe roghnaithe.\n\
Úsáid go minic chun leibhéil éagsúla a shocrú do logálaithe éagsúla.\n\
Is é an fhormáid chun an Leibhéal Logála a shocrú do phacáiste ná <prefix>=<level>,\n\
chun an Leibhéal Logála domhanda a shocrú úsáid <level>.\n\
Déileáiltear le réimíreanna mar ainmneacha pacáiste, i.e., an réimír "com.example"\n\
meaitseálann sé logálaithe leis an ainm "com.example", "com.example.foo", srl., ach\n\
NÍL "com.example_foo".
dua3.utility.fx.launcher.arg.log_buffer_size.name=Méid maoláin loga
dua3.utility.fx.launcher.arg.log_buffer_size.description=Socraigh méid an mhaoláin loga.
