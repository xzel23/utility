dua3.utility.fx.controls.launcher.arg.log_level.name=Günlük Seviyesi
dua3.utility.fx.controls.launcher.arg.log_level.description=Genel Günlük Seviyesini veya seçilen günlükçüler için Günlük Seviyesini ayarlayın.\n\
Farklı günlükçüler için farklı seviyeler ayarlamak için birden fazla kez kullanın.\n\
Bir paket için Günlük Seviyesini ayarlama formatı <prefix>=<level> şeklindedir,\n\
genel Günlük Seviyesini ayarlamak için <level> kullanın.\n\
Önekler paket adları gibi değerlendirilir, yani "com.example" öneki\n\
"com.example", "com.example.foo" vb. adlara sahip günlükçülerle eşleşir, ancak\n\
"com.example_foo" ile EŞLEŞMEZ.
