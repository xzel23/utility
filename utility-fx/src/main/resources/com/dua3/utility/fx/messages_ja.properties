dua3.utility.fx.controls.launcher.arg.log_level.name=ログレベル
dua3.utility.fx.controls.launcher.arg.log_level.description=グローバルなログレベル、または選択したロガーのログレベルを設定します。\n\
複数のロガーに異なるレベルを設定するには、複数回使用します。\n\
パッケージのログレベルを設定する形式は <prefix>=<level> です。\n\
グローバルなログレベルを設定するには <level> を使用します。\n\
プレフィックスはパッケージ名として扱われます。つまり、プレフィックス "com.example" は\n\
"com.example"、"com.example.foo" などの名前のロガーに一致しますが、\n\
"com.example_foo" には一致しません。
dua3.utility.fx.controls.launcher.arg.log_buffer_size.name=ログバッファサイズ
dua3.utility.fx.controls.launcher.arg.log_buffer_size.description=ログバッファのサイズを設定。
