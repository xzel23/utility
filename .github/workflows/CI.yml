name: CI
on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 'Set up JDK'
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: |
            21
            25
          java-package: 'jdk+fx'

      - name: 'Extract Gradle Version'
        id: gradle-version
        run: |
          GRADLE_VERSION=$(sed -n -e 's!.*gradle-!!' -e 's!-bin.zip!!p' < gradle/wrapper/gradle-wrapper.properties)
          echo "Detected Gradle version: $GRADLE_VERSION"
          echo "gradle_version=$GRADLE_VERSION" >> "$GITHUB_OUTPUT"
          mkdir -p build/gradle-version
          echo "$GRADLE_VERSION" > build/gradle-version/version.txt

      - name: 'Setup Gradle'
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: ${{ steps.gradle-version.outputs.gradle_version }}
          gradle-home-cache-includes: |
            caches
            notifications
            jdks
            wrapper
            toolchains

      - name: 'Execute Gradle build'
        run: gradle --no-daemon --build-cache assemble testClasses aggregateJavadoc publishToStagingDirectory
        id: compile

      # Upload artifacts
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts
          path: |
            **/build/libs/*.jar
            **/build/classes/
            **/build/classes-cabe/
            build/gradle-version/version.txt
          path-root: ${{ github.workspace }}
          if-no-files-found: error

      - name: 'Upload staging directory'
        uses: actions/upload-artifact@v7
        with:
          name: staging-deploy
          path: build/staging-deploy
          if-no-files-found: error

      - name: 'Upload Javadoc'
        uses: actions/upload-artifact@v7
        with:
          name: javadoc
          path: build/docs/javadoc
          if-no-files-found: error

  test-linux:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: 'Set up JDK'
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: |
            21
            25
          java-package: 'jdk+fx'

      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: build-artifacts
          path: ${{ github.workspace }}

      - name: 'Read Gradle Version'
        id: gradle-version
        run: |
          GRADLE_VERSION=$(cat build/gradle-version/version.txt)
          echo "gradle_version=$GRADLE_VERSION" >> "$GITHUB_OUTPUT"

      - name: 'Setup Gradle'
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: ${{ steps.gradle-version.outputs.gradle_version }}
          gradle-home-cache-includes: |
            caches
            notifications
            jdks
            wrapper
            toolchains

      - name: Start xvfb
        run: Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &

      - name: Run tests
        run: gradle --no-daemon --build-cache test testCodeCoverageReport
        env:
          DISPLAY: ":99"

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: |
            **/build/reports/jacoco/test/jacocoTestReport.xml
            **/build/reports/jacoco/testCodeCoverageReport/testCodeCoverageReport.xml
          if-no-files-found: warn

  test-windows:
    needs: build
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: 'Set up JDK'
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: |
            21
            25
          java-package: 'jdk+fx'

      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: build-artifacts
          path: ${{ github.workspace }}

      - name: 'Read Gradle Version'
        id: gradle-version
        shell: bash
        run: |
          GRADLE_VERSION=$(cat build/gradle-version/version.txt)
          echo "gradle_version=$GRADLE_VERSION" >> "$GITHUB_OUTPUT"

      - name: 'Setup Gradle'
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: ${{ steps.gradle-version.outputs.gradle_version }}
          gradle-home-cache-includes: |
            caches
            notifications
            jdks
            wrapper
            toolchains

      - name: Run tests
        run: gradle --no-daemon --build-cache test -x jacocoTestReport

  sonar:
    needs: test-linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 'Set up JDK'
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: |
            21
            25
          java-package: 'jdk+fx'

      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: build-artifacts
          path: ${{ github.workspace }}

      - name: 'Read Gradle Version'
        id: gradle-version
        run: |
          GRADLE_VERSION=$(cat build/gradle-version/version.txt)
          echo "gradle_version=$GRADLE_VERSION" >> "$GITHUB_OUTPUT"

      - name: 'Setup Gradle'
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: ${{ steps.gradle-version.outputs.gradle_version }}
          gradle-home-cache-includes: |
            caches
            notifications
            jdks
            wrapper
            toolchains

      - name: Download coverage reports
        uses: actions/download-artifact@v5
        with:
          name: coverage-reports
          path: ${{ github.workspace }}

      - name: 'Cache SonarCloud packages'
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: 'Sonar Scan'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          gradle --no-daemon --build-cache --no-parallel sonar
          -Dsonar.projectKey=xzel23_utility
          -Dsonar.organization=xzel23
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.coverage.jacoco.xmlReportPaths=**/build/reports/jacoco/**/*.xml

